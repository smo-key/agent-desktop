<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;background:var(--bg-surface);font-family:var(--font-sans);
       display:flex;align-items:center;gap:40px;padding:30px 34px;box-sizing:border-box}
  .lockup{display:flex;align-items:center;gap:13px}
  .wm{font-family:var(--font-display);font-weight:600;letter-spacing:-0.02em;color:var(--fg-1);
      font-size:25px;line-height:1}
  .wm .ctrl{color:var(--fg-2);font-weight:500}
  .stack{display:flex;flex-direction:column;gap:14px}
  .lockup-v{display:flex;flex-direction:column;align-items:center;gap:8px}
  .wm-mono{font-family:var(--font-mono);font-weight:500;font-size:11px;letter-spacing:.34em;
           text-transform:uppercase;color:var(--fg-3)}
  .divider{width:1px;align-self:stretch;background:var(--line-subtle)}
</style>
</head>
<body>
  <div class="lockup">
    <img src="../assets/logomark.svg" width="44" height="44" alt="">
    <div class="wm">Mission<span class="ctrl"> Control</span></div>
  </div>
  <div class="divider"></div>
  <div class="lockup-v">
    <img src="../assets/logomark.svg" width="36" height="36" alt="">
    <div class="wm-mono">Mission&nbsp;Control</div>
  </div>
</body>
</html>
