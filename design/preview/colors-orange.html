<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;background:var(--bg-surface);padding:24px 28px;box-sizing:border-box}
  .meta{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
        color:var(--fg-3);margin-bottom:14px}
  .ramp{display:flex;gap:8px}
  .sw{flex:1;display:flex;flex-direction:column;gap:7px}
  .chip{height:58px;border-radius:var(--r-md);border:1px solid var(--line-subtle)}
  .nm{font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
  .hex{font-family:var(--font-mono);font-size:9px;color:var(--fg-4)}
</style>
</head>
<body>
  <div class="meta">Claude Clay-Orange · energy / live / attention &nbsp;—&nbsp; <span style="color:var(--orange-400)">use sparingly</span></div>
  <div class="ramp">
    <div class="sw"><div class="chip" style="background:#FFD2B3"></div><span class="nm">200</span><span class="hex">#FFD2B3</span></div>
    <div class="sw"><div class="chip" style="background:#FFB78C"></div><span class="nm">300</span><span class="hex">#FFB78C</span></div>
    <div class="sw"><div class="chip" style="background:#FF9A63"></div><span class="nm">400</span><span class="hex">#FF9A63</span></div>
    <div class="sw"><div class="chip" style="background:#EE7E4D;box-shadow:var(--glow-orange)"></div><span class="nm" style="color:var(--orange-300)">500 ★</span><span class="hex">#EE7E4D</span></div>
    <div class="sw"><div class="chip" style="background:#D9663A"></div><span class="nm">600</span><span class="hex">#D9663A</span></div>
    <div class="sw"><div class="chip" style="background:#B44E2B"></div><span class="nm">700</span><span class="hex">#B44E2B</span></div>
    <div class="sw"><div class="chip" style="background:#D97757"></div><span class="nm">clay</span><span class="hex">#D97757</span></div>
  </div>
</body>
</html>
