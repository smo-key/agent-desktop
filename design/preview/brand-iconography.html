<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;background:var(--bg-surface);padding:24px 30px;box-sizing:border-box}
  .meta{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
        color:var(--fg-3);margin-bottom:18px}
  .grid{display:flex;gap:26px;flex-wrap:wrap}
  .ic{display:flex;flex-direction:column;align-items:center;gap:9px}
  .ic svg{width:22px;height:22px;color:var(--fg-2)}
  .ic span{font-family:var(--font-mono);font-size:9px;color:var(--fg-4)}
</style>
</head>
<body>
  <div class="meta">Iconography · Lucide · 1.75px stroke, 24px grid</div>
  <div class="grid" id="grid"></div>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
  <script>
    const icons = [
      ['rocket','launch'],['git-branch','branch'],['circle-check','approve'],
      ['pause','pause'],['octagon-x','abort'],['radar','monitor'],
      ['list-checks','tasks'],['shield-check','trusted'],['clock','runtime'],
      ['layout-dashboard','control'],['bell','notify'],['settings','settings']
    ];
    const g = document.getElementById('grid');
    icons.forEach(([n,l])=>{
      const d=document.createElement('div');d.className='ic';
      d.innerHTML=`<i data-lucide="${n}"></i><span>${l}</span>`;
      g.appendChild(d);
    });
    lucide.createIcons({attrs:{'stroke-width':1.75}});
  </script>
</body>
</html>
