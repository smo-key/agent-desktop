<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;background:var(--bg-surface);padding:26px 32px;box-sizing:border-box}
  .meta{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
        color:var(--fg-3);margin-bottom:16px}
  .telem{font-family:var(--font-mono);font-size:13px;color:var(--fg-2);line-height:1.9;
          font-variant-numeric:tabular-nums}
  .t-label{color:var(--fg-3);text-transform:uppercase;letter-spacing:.08em;font-size:11px}
  .ok{color:var(--nominal-500)}
  .blue{color:var(--blue-400)}
  .orange{color:var(--orange-400)}
</style>
</head>
<body>
  <div class="meta">Mono · JetBrains Mono · telemetry &amp; labels</div>
  <div class="telem">
    <span class="t-label">agent</span>&nbsp;&nbsp;AC-204 · ORBITER&nbsp;&nbsp;<span class="ok">● NOMINAL</span><br>
    <span class="t-label">task</span>&nbsp;&nbsp;&nbsp;refactor auth module&nbsp;&nbsp;<span class="blue">[ 14 / 18 ]</span><br>
    <span class="t-label">uptime</span>&nbsp;00:42:07&nbsp;&nbsp;·&nbsp;&nbsp;tokens 38.2k&nbsp;&nbsp;·&nbsp;&nbsp;<span class="orange">awaiting&nbsp;review</span>
  </div>
</body>
</html>
