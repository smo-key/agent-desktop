<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;background:var(--bg-surface);padding:24px 30px;box-sizing:border-box}
  .meta{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
        color:var(--fg-3);margin-bottom:16px}
  .grid{display:flex;gap:0}
  .col{flex:1;display:flex;flex-direction:column;gap:5px;padding-right:18px}
  .samp{font-family:var(--font-sans);font-size:19px;font-weight:500}
  .nm{font-family:var(--font-mono);font-size:10px;color:var(--fg-4)}
  .line{height:1px;background:var(--line-subtle);margin:14px 0}
  .hairs{display:flex;gap:14px;align-items:center}
  .hb{flex:1;height:34px;border-radius:var(--r-sm);background:var(--space-800)}
</style>
</head>
<body>
  <div class="meta">Text foreground &amp; hairlines</div>
  <div class="grid">
    <div class="col"><span class="samp" style="color:#EEF1F6">Primary</span><span class="nm">--fg-1 · #EEF1F6</span></div>
    <div class="col"><span class="samp" style="color:#B2BACA">Secondary</span><span class="nm">--fg-2 · #B2BACA</span></div>
    <div class="col"><span class="samp" style="color:#7B8499">Muted</span><span class="nm">--fg-3 · #7B8499</span></div>
    <div class="col"><span class="samp" style="color:#515B71">Faint</span><span class="nm">--fg-4 · #515B71</span></div>
  </div>
  <div class="line"></div>
  <div class="hairs">
    <div class="hb" style="border:1px solid rgba(255,255,255,0.05)"></div>
    <div class="hb" style="border:1px solid rgba(255,255,255,0.08)"></div>
    <div class="hb" style="border:1px solid rgba(255,255,255,0.12)"></div>
    <div class="hb" style="border:1px solid rgba(255,255,255,0.18)"></div>
  </div>
</body>
</html>
