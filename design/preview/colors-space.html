<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;background:var(--bg-surface);padding:24px 28px;box-sizing:border-box}
  .meta{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
        color:var(--fg-3);margin-bottom:14px}
  .ramp{display:flex;gap:8px}
  .sw{flex:1;display:flex;flex-direction:column;gap:7px}
  .chip{height:58px;border-radius:var(--r-md);border:1px solid var(--line-subtle)}
  .nm{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);letter-spacing:.02em}
  .hex{font-family:var(--font-mono);font-size:9px;color:var(--fg-4)}
</style>
</head>
<body>
  <div class="meta">Deep Space · neutral surfaces (near-black, cool tint)</div>
  <div class="ramp">
    <div class="sw"><div class="chip" style="background:#06080C"></div><span class="nm">950</span><span class="hex">#06080C</span></div>
    <div class="sw"><div class="chip" style="background:#090C12"></div><span class="nm">900</span><span class="hex">#090C12</span></div>
    <div class="sw"><div class="chip" style="background:#0D1017"></div><span class="nm">850·app</span><span class="hex">#0D1017</span></div>
    <div class="sw"><div class="chip" style="background:#161B26"></div><span class="nm">750·card</span><span class="hex">#161B26</span></div>
    <div class="sw"><div class="chip" style="background:#1C222F"></div><span class="nm">700</span><span class="hex">#1C222F</span></div>
    <div class="sw"><div class="chip" style="background:#232A39"></div><span class="nm">650·hover</span><span class="hex">#232A39</span></div>
    <div class="sw"><div class="chip" style="background:#2C3445"></div><span class="nm">600</span><span class="hex">#2C3445</span></div>
  </div>
</body>
</html>
