<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;background:var(--bg-surface);padding:26px 32px;box-sizing:border-box}
  .meta{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
        color:var(--fg-3);margin-bottom:14px}
  .row{font-family:var(--font-display);color:var(--fg-1);font-weight:600;letter-spacing:-0.02em;line-height:1.04}
  .big{font-size:46px}
  .med{font-size:28px;margin-top:6px}
  .alt{color:var(--fg-3);font-weight:400}
</style>
</head>
<body>
  <div class="meta">Display · Space Grotesk · 600 / 400</div>
  <div class="row big">Manage, don't micromanage.</div>
  <div class="row med">Dispatch agents <span class="alt">into orbit</span></div>
</body>
</html>
