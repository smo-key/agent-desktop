name: Release

# Releases on a version bump to main: when package.json's version is higher than
# the latest v* tag, the gate job syncs the manifests, regenerates CHANGELOG.md,
# commits `chore(release): v<version> [skip ci]`, tags v<version>, and the build
# matrix produces + publishes signed installers for all four targets to a single
# GitHub Release.
#
# Manual workflow_dispatch inputs:
#   bundle_test   — build the Windows installer end-to-end and upload it as a
#                   workflow artifact. No tag, no Release. Use this to prove the
#                   packaging BEFORE a version bump, since `gate` pushes the tag
#                   before any build runs and a packaging failure would otherwise
#                   burn the version number.
#   force_publish — force a release build without a version bump. NOTE: this only
#                   works for a version whose tag does NOT yet exist; otherwise it
#                   overrides the gate's idempotency decision and then fails at
#                   `git tag -a`. Prefer `bundle_test` for testing a build.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force a release build even without a version bump (uses the current package.json version)"
        type: boolean
        default: false
      bundle_test:
        description: "Build the Windows installer end-to-end and upload it as a workflow artifact (no tag, no Release)"
        type: boolean
        default: false

# Needs write access to push the sync commit + tag and create/update the Release.
permissions:
  contents: write

# Pinned upstream source tags for the sidecars. These are passed into the
# provision step AND used as cache-key inputs, so the from-source build is
# reproducible and a cache is reused until the pin changes. LLAMA_TAG must be a
# concrete tag (not a moving branch like `master`) for both to hold.
env:
  WHISPER_TAG: v1.7.4
  LLAMA_TAG: b4000

jobs:
  # ---------------------------------------------------------------------------
  # gate: decide whether to release; if so, sync version, changelog, commit, tag.
  # ---------------------------------------------------------------------------
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      version: ${{ steps.decide.outputs.version }}
      tag: ${{ steps.decide.outputs.tag }}
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # Skip-ci guard. GitHub Actions does NOT honor [skip ci] natively on push,
      # so we guard here: the version-sync commit (which carries [skip ci]) must
      # NOT start another release. We deliberately match ONLY [skip ci], not the
      # `chore(release):` subject — a hand-authored `chore(release): …` commit
      # (without [skip ci]) is allowed to drive a release. Loop safety for the
      # gate's own sync commit still holds via two independent layers: it carries
      # [skip ci] (caught here), and release-gate.sh refuses to re-release once
      # tag v<version> exists (idempotency backstop).
      - name: Skip-ci guard
        id: skipci
        run: |
          MSG="$(git log -1 --pretty=%B)"
          echo "head commit subject: $(git log -1 --pretty=%s)"
          if printf '%s' "$MSG" | grep -qE '\[skip ci\]'; then
            echo "skip=true" >>"$GITHUB_OUTPUT"
            echo "Head commit carries [skip ci]; will not release."
          else
            echo "skip=false" >>"$GITHUB_OUTPUT"
          fi

      # Compute should_release from the version vs the latest tag (idempotent).
      # The force_publish dispatch input overrides a "no bump" decision but still
      # respects the tag-already-exists guard inside release-gate.sh.
      - name: Gate decision
        id: decide
        run: |
          if [ "${{ steps.skipci.outputs.skip }}" = "true" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "should_release=false" >>"$GITHUB_OUTPUT"
            echo "Skip-ci guard tripped; not releasing."
            exit 0
          fi
          bash scripts/release-gate.sh
          # release-gate.sh has already written should_release/version/tag to
          # $GITHUB_OUTPUT. Re-read them so we can apply the force override.
          SR="$(grep -E '^should_release=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2)"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_publish }}" = "true" ] && [ "$SR" != "true" ]; then
            echo "force_publish set: overriding should_release=true"
            echo "should_release=true" >>"$GITHUB_OUTPUT"
          fi

      - name: Sync version into manifests
        if: steps.decide.outputs.should_release == 'true'
        run: bash scripts/sync-version.sh "${{ steps.decide.outputs.version }}"

      # Install the pinned git-cliff and regenerate the FULL changelog plus the
      # since-last-tag release notes (saved for the Release body).
      - name: Install git-cliff
        if: steps.decide.outputs.should_release == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2.13.1

      - name: Generate changelog + release notes
        if: steps.decide.outputs.should_release == 'true'
        run: |
          # Full changelog (committed alongside the sync commit).
          git-cliff --tag "${{ steps.decide.outputs.tag }}" -o CHANGELOG.md
          # Release body: just the commits since the previous tag, header stripped.
          git-cliff --unreleased --tag "${{ steps.decide.outputs.tag }}" --strip header -o RELEASE_NOTES.md
          echo "----- RELEASE_NOTES.md -----"
          cat RELEASE_NOTES.md

      - name: Commit sync + tag
        if: steps.decide.outputs.should_release == 'true'
        env:
          VERSION: ${{ steps.decide.outputs.version }}
          TAG: ${{ steps.decide.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No manifest changes to commit (already in sync)."
          else
            git commit -m "chore(release): ${TAG} [skip ci]"
          fi
          git push origin HEAD:main
          # Annotated tag on the (possibly just-committed) release commit.
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Upload release notes artifact
        if: steps.decide.outputs.should_release == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  # ---------------------------------------------------------------------------
  # create-release: make ONE draft Release up front so the parallel matrix jobs
  # upload to a known release id instead of racing to create it.
  # ---------------------------------------------------------------------------
  create-release:
    needs: gate
    if: needs.gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v8
        with:
          name: release-notes

      - name: Create draft release
        id: create
        uses: actions/github-script@v9
        env:
          TAG: ${{ needs.gate.outputs.tag }}
        with:
          result-encoding: string
          script: |
            const fs = require('fs');
            let body = '';
            try { body = fs.readFileSync('RELEASE_NOTES.md', 'utf8'); } catch (e) {}
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.TAG,
              name: process.env.TAG,
              body,
              draft: true,
              prerelease: false,
            });
            return data.id;

  # ---------------------------------------------------------------------------
  # windows-check: fast, release-BLOCKING proof that src-tauri still compiles for
  # Windows. Runs on every push (not just releases) and needs no sidecars, no
  # frontend build, and no bundling, so a Windows-breaking change is reported in
  # ~2 minutes instead of surfacing at bundle time — or, as before this gate
  # existed, going unnoticed until someone asked for a Windows build.
  # `cargo check` does not link, so the sidecar binaries are irrelevant here;
  # `tauri-build` still demands they EXIST, hence the stubs.
  # ---------------------------------------------------------------------------
  windows-check:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: wincheck-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            wincheck-

      # tauri-build validates that every `externalBin` exists before the crate is
      # checked. Real sidecars take ~20 minutes to build from source and none of
      # their bytes affect type-checking, so stub them.
      - name: Stub sidecars for the check
        shell: bash
        run: |
          mkdir -p src-tauri/binaries src-tauri/models
          for n in whisper-cli whisper-server llama-server; do
            printf 'MZ' > "src-tauri/binaries/$n-x86_64-pc-windows-msvc.exe"
          done
          : > src-tauri/models/ggml-tiny.bin

      - name: cargo check (x86_64-pc-windows-msvc)
        working-directory: src-tauri
        run: cargo check --target x86_64-pc-windows-msvc --all-targets

  # ---------------------------------------------------------------------------
  # windows-bundle: build the REAL Windows installer end-to-end (sidecars from
  # source, quality gate, NSIS/MSI packaging) and upload it as a workflow
  # ARTIFACT — no version bump, no tag, no GitHub Release.
  #
  # Why this exists: the Windows bundle path had never completed even once (its
  # leg was continue-on-error and failed every release), while `gate` pushes the
  # release tag BEFORE any build runs. Discovering a Windows packaging failure
  # during a real release therefore burns the version number and leaves a stuck
  # draft that release-gate.sh's idempotency guard refuses to retry. This proves
  # the packaging first. It also produces a downloadable installer for the manual
  # on-Windows validation that no CI job can perform.
  #
  # `force_publish` cannot serve this purpose: it forces should_release=true for a
  # version whose tag already exists, and the `git tag -a` step then fails.
  # ---------------------------------------------------------------------------
  windows-bundle:
    if: github.event_name == 'workflow_dispatch' && inputs.bundle_test
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-x86_64-pc-windows-msvc-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-x86_64-pc-windows-msvc-

      # Shares the release matrix's sidecar cache key, so a successful build here
      # also warms the cache the real release leg will use.
      - name: Cache sidecars
        uses: actions/cache@v5
        with:
          path: src-tauri/binaries
          key: sidecars-x86_64-pc-windows-msvc-w${{ env.WHISPER_TAG }}-l${{ env.LLAMA_TAG }}-${{ hashFiles('scripts/fetch-whisper.sh', 'scripts/fetch-llama.sh', 'scripts/lib/target-triple.sh') }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Provision sidecars + model
        shell: bash
        env:
          TARGET_TRIPLE: x86_64-pc-windows-msvc
          WHISPER_TAG: ${{ env.WHISPER_TAG }}
          LLAMA_TAG: ${{ env.LLAMA_TAG }}
        run: |
          ./scripts/fetch-whisper.sh
          ./scripts/fetch-llama.sh
          ./scripts/fetch-models.sh
          ./scripts/validate-sidecars.sh

      - name: Quality gate
        run: yarn check:gate

      # Updater artifacts stay ENABLED so this exercises the same signing path a
      # real release takes, rather than a subtly easier one.
      - name: Build the Windows installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: yarn tauri build --target x86_64-pc-windows-msvc

      - name: Upload the installer
        uses: actions/upload-artifact@v7
        with:
          name: agent-desktop-windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # build: native build matrix; uploads to the draft release created above.
  # ---------------------------------------------------------------------------
  build:
    needs: [gate, create-release]
    if: needs.gate.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            triple: aarch64-apple-darwin
          # Pin to windows-2022 (Visual Studio 2022). `windows-latest` moved to
          # the windows-2025 image, which ships Visual Studio 2026 — the sidecar
          # cmake invocations request the "Visual Studio 17 2022" generator and
          # fail there with "could not find any instance of Visual Studio".
          - runner: windows-2022
            triple: x86_64-pc-windows-msvc
          - runner: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
          - runner: ubuntu-22.04-arm
            triple: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    # ALL FOUR targets are required — no leg is continue-on-error. Windows used to
    # be best-effort because src-tauri did not compile there (events.rs /
    # orchestration.rs bound Unix-domain sockets); that IPC now runs over a
    # cross-platform local socket (src-tauri/src/ipc.rs), so a Windows break is a
    # real regression and must block the release rather than silently publishing
    # without the Windows installer — which is exactly how Windows rotted to
    # non-compiling unnoticed. `fail-fast: false` still lets every other target
    # finish and upload, so one failure never hides another.
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      # Fail fast with a clear message rather than a cryptic `tauri build` error:
      # the updater is enabled (bundle.createUpdaterArtifacts + a committed
      # pubkey), so Tauri requires the private key to emit/sign update artifacts.
      - name: Verify updater signing key present
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set. In-app updates are enabled, so a release build cannot sign updater artifacts without it. Run 'tauri signer generate' and add the private key as the TAURI_SIGNING_PRIVATE_KEY repo secret (see README 'Releases')."
            exit 1
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      # Linux Tauri system dependencies + sidecar build deps.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            cmake \
            build-essential

      - name: Cache cargo + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ matrix.triple }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.triple }}-

      # Sidecar cache keyed on the pinned whisper/llama source tags + triple, so
      # the expensive from-source build only reruns when a pin or triple changes.
      - name: Cache sidecars
        id: sidecar-cache
        uses: actions/cache@v5
        with:
          path: src-tauri/binaries
          key: sidecars-${{ matrix.triple }}-w${{ env.WHISPER_TAG }}-l${{ env.LLAMA_TAG }}-${{ hashFiles('scripts/fetch-whisper.sh', 'scripts/fetch-llama.sh', 'scripts/lib/target-triple.sh') }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Provision sidecars + model for this matrix triple. Bash steps run under
      # Git Bash on Windows (the fetch scripts drive the MSVC cmake generator).
      - name: Provision sidecars + model
        shell: bash
        env:
          TARGET_TRIPLE: ${{ matrix.triple }}
          WHISPER_TAG: ${{ env.WHISPER_TAG }}
          LLAMA_TAG: ${{ env.LLAMA_TAG }}
        run: |
          ./scripts/fetch-whisper.sh
          ./scripts/fetch-llama.sh
          ./scripts/fetch-models.sh
          ./scripts/validate-sidecars.sh

      # Quality gate must pass BEFORE packaging; a failure fails the job.
      - name: Quality gate
        run: yarn check:gate

      # Decide whether the macOS leg can sign, and export the Apple signing/notary
      # env ONLY when it can. This is load-bearing: tauri-bundler keys off the mere
      # PRESENCE of `APPLE_CERTIFICATE` (Rust `var_os` returns `Some("")` for an
      # env var set to the empty string), so passing the secrets as `${{ secrets.X
      # }}` — which yields an empty string when a secret is unset — makes the
      # bundler run `security import` on an empty cert and fail the whole release
      # leg (the symptom: "failed to import keychain certificate"). We therefore
      # do NOT put these vars in the build step's static `env:` map; instead we
      # pre-flight the real `security import` into a throwaway keychain here and,
      # only on success, EXPORT the (non-empty) signing+notary vars to
      # $GITHUB_ENV. When the cert is absent or unimportable we export nothing —
      # the vars stay truly unset and `tauri build` produces a clean UNSIGNED
      # bundle instead of failing. Fixing the secrets flips this to signed with no
      # workflow change.
      - name: Preflight macOS signing
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Export VALUE under NAME to the build step only when non-empty, using
          # the heredoc form so a multiline base64 cert survives intact.
          export_env() {
            [ -n "$2" ] || return 0
            { printf '%s<<__AD_EOF__\n%s\n__AD_EOF__\n' "$1" "$2"; } >>"$GITHUB_ENV"
          }
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "::warning::APPLE_CERTIFICATE secret is empty; macOS artifact will be UNSIGNED (fork/PR fallback)."
            exit 0
          fi
          work="$(mktemp -d)"
          cert="$work/cert.p12"
          kc="$work/preflight.keychain-db"
          # Accept raw base64 or a `data:...,<b64>` URI (strip an optional prefix).
          printf '%s' "$APPLE_CERTIFICATE" | sed 's/^data:[^,]*,//' | base64 --decode >"$cert" 2>/dev/null || true
          security create-keychain -p preflight "$kc" 2>/dev/null || true
          security unlock-keychain -p preflight "$kc" 2>/dev/null || true
          if security import "$cert" -k "$kc" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign >/dev/null 2>&1; then
            echo "macOS signing certificate imported OK; build will be SIGNED + notarized where creds allow."
            export_env APPLE_CERTIFICATE "$APPLE_CERTIFICATE"
            export_env APPLE_CERTIFICATE_PASSWORD "$APPLE_CERTIFICATE_PASSWORD"
            export_env APPLE_SIGNING_IDENTITY "$APPLE_SIGNING_IDENTITY"
            export_env KEYCHAIN_PASSWORD "$KEYCHAIN_PASSWORD"
            export_env APPLE_API_ISSUER "$APPLE_API_ISSUER"
            export_env APPLE_API_KEY "$APPLE_API_KEY"
            export_env APPLE_API_KEY_PATH "$APPLE_API_KEY_PATH"
            export_env APPLE_ID "$APPLE_ID"
            export_env APPLE_PASSWORD "$APPLE_PASSWORD"
            export_env APPLE_TEAM_ID "$APPLE_TEAM_ID"
          else
            echo "::warning::APPLE_CERTIFICATE is present but could not be imported (corrupt p12/base64 or wrong APPLE_CERTIFICATE_PASSWORD); macOS artifact will be UNSIGNED. Fix the secret to restore signing."
          fi
          security delete-keychain "$kc" 2>/dev/null || true
          rm -rf "$work"

      - name: Build + publish to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing/notary env is intentionally NOT listed here: the
          # Preflight step above exports those vars to $GITHUB_ENV only when the
          # cert actually imports (see its comment). Listing them as `${{ secrets.X
          # }}` would set them to empty strings when unset, which tauri-bundler
          # treats as "present" and then fails on `security import`. Absent =
          # unsigned-but-successful; present = signed.
          #
          # Updater bundle signing (forward-compatible: used once the updater
          # plugin is configured in a later task). These are safe to pass directly
          # — the updater key is required and present, and an empty password just
          # means "key has no password".
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Upload every target's installers (+ updater artifacts once enabled)
          # to the single draft Release created by the create-release job. Using
          # releaseId (not tagName) avoids the parallel-create race.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.triple }}

  # ---------------------------------------------------------------------------
  # publish-release: flip the draft to published once the build matrix finishes.
  # Every target is required, so `build` succeeds — and this job runs — only when
  # all four built and uploaded. If ANY leg fails (Windows included), `build`
  # fails, this job is skipped, and the release stays a draft rather than being
  # published with a platform's installer missing.
  # ---------------------------------------------------------------------------
  publish-release:
    # `windows-check` runs in parallel with the (much longer) build matrix, so
    # gating on it here costs no wall-clock but guarantees a release can never be
    # published from a tree that does not compile for Windows.
    needs: [gate, create-release, build, windows-check]
    if: needs.gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Publish (undraft) the release
        uses: actions/github-script@v9
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
            });
